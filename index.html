<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATLAS — Investment Research</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%231a1a18'/><polygon points='16,5 27,13 27,27 5,27 5,13' fill='none' stroke='%23e8e8e2' stroke-width='1.6' stroke-linejoin='round'/><rect x='11.5' y='18.5' width='9' height='8.5' fill='%23e0aa4a' rx='0.8'/></svg>">
<style>
  :root {
    --bg:#ffffff;--bg2:#f7f6f3;--bg3:#f0efe9;
    --text:#1a1a18;--text2:#6b6b67;--text3:#9e9e99;
    --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.18);--border3:rgba(0,0,0,0.28);
    --gold:#b07d2e;--gold-bg:#fdf3e0;
    --green:#1d6b3e;--green-bg:#e8f5ee;
    --red:#b03030;--red-bg:#fdeaea;
    --blue:#1a4f8a;--blue-bg:#e8f0fb;
    --amber:#8a5a10;--amber-bg:#fdf0d8;
    --radius:10px;--radius-sm:6px;
    --mono:'SF Mono','Fira Code','Cascadia Code',monospace;
    --serif:Georgia,'Times New Roman',serif;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
    --text:#e8e8e2;--text2:#9e9e98;--text3:#6a6a65;
    --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--border3:rgba(255,255,255,0.22);
    --gold:#e0aa4a;--gold-bg:#2e2510;--green:#4caf78;--green-bg:#0f2a1c;
    --red:#e07070;--red-bg:#2a1010;--blue:#6699dd;--blue-bg:#0e1e32;
    --amber:#e0aa4a;--amber-bg:#2e2208;
  }}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{font-size:15px;}
  body{font-family:var(--sans);background:var(--bg3);color:var(--text);min-height:100vh;}
  a{color:var(--blue);}
  #app{display:flex;flex-direction:column;min-height:100vh;}
  header{background:var(--bg);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:12px;}
  .logo{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none;color:var(--text);flex-shrink:0;}
  .logo-name{font-family:var(--serif);font-size:18px;font-weight:normal;letter-spacing:0.05em;}
  .logo-sub{font-size:11px;color:var(--text3);padding-left:10px;border-left:1px solid var(--border2);}
  #header-nav{display:flex;align-items:center;gap:8px;}
  main{flex:1;padding:28px 24px;max-width:1100px;margin:0 auto;width:100%;}
  button,.btn{cursor:pointer;font-family:var(--sans);font-size:13px;border-radius:var(--radius-sm);padding:7px 14px;border:1px solid var(--border2);background:transparent;color:var(--text);transition:background 0.12s,opacity 0.12s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;text-decoration:none;}
  button:hover,.btn:hover{background:var(--bg2);}
  button:disabled{opacity:0.4;cursor:not-allowed;}
  .btn-primary{background:var(--text);color:var(--bg);border-color:transparent;font-weight:500;}
  .btn-primary:hover{opacity:0.85;background:var(--text);}
  .btn-gold{background:var(--gold-bg);color:var(--gold);border-color:transparent;font-weight:500;}
  .btn-gold:hover{opacity:0.85;}
  .btn-danger{color:var(--red);border-color:var(--border);}
  .btn-danger:hover{background:var(--red-bg);}
  .btn-sm{font-size:12px;padding:4px 10px;}
  input,select,textarea{font-family:var(--sans);font-size:13px;background:var(--bg);border:1px solid var(--border2);color:var(--text);border-radius:var(--radius-sm);padding:8px 10px;outline:none;transition:border-color 0.12s;width:100%;display:block;}
  input:focus,select:focus,textarea:focus{border-color:var(--border3);}
  label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;}
  .field{margin-bottom:14px;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .field-full{grid-column:span 2;}
  .card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:border-color 0.12s;}
  .card-clickable{cursor:pointer;}
  .card-clickable:hover{border-color:var(--border3);}
  .pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;}
  .tag{display:inline-block;font-size:11px;padding:1px 7px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);white-space:nowrap;}
  .pill-alcista{background:var(--green-bg);color:var(--green);}
  .pill-bajista{background:var(--red-bg);color:var(--red);}
  .pill-neutral{background:var(--bg2);color:var(--text2);}
  .pill-posicion{background:var(--amber-bg);color:var(--amber);}
  .pill-seguimiento{background:var(--blue-bg);color:var(--blue);}
  .page-header{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:22px;}
  .page-title{font-family:var(--serif);font-size:24px;font-weight:normal;margin-bottom:3px;}
  .page-sub{font-size:12px;color:var(--text3);}
  .filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .filter-row input[type="text"]{width:200px;}
  .filter-row select{width:150px;}
  .analyses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;}
  .analysis-card{display:flex;flex-direction:column;gap:8px;}
  .analysis-card .ticker{font-family:var(--mono);font-size:15px;font-weight:600;}
  .analysis-card .card-top{display:flex;justify-content:space-between;align-items:center;}
  .analysis-card .name{font-size:14px;font-weight:500;line-height:1.4;}
  .analysis-card .summary-text{font-size:12px;color:var(--text2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .analysis-card .card-bottom{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;margin-top:2px;}
  .analysis-card .date{font-size:11px;font-family:var(--mono);color:var(--text3);}
  .tags-row{display:flex;gap:4px;flex-wrap:wrap;}
  .detail-header{padding-bottom:18px;border-bottom:1px solid var(--border);margin-bottom:18px;}
  .detail-ticker{font-family:var(--mono);font-size:32px;font-weight:700;line-height:1;margin-bottom:10px;}
  .detail-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .exec-summary{background:var(--bg2);border-left:2px solid var(--border3);padding:10px 14px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin-bottom:14px;font-size:13px;line-height:1.65;color:var(--text2);}
  .exec-summary strong{color:var(--text);}
  .body-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;font-size:13px;line-height:1.8;}
  .tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px;}
  .tab-btn{font-size:13px;padding:9px 18px;border:none;border-bottom:2px solid transparent;border-radius:0;background:transparent;color:var(--text2);cursor:pointer;margin-bottom:-1px;}
  .tab-btn:hover{background:var(--bg2);color:var(--text);}
  .tab-btn.active{color:var(--text);border-bottom-color:var(--text);font-weight:500;}
  .md h1{font-family:var(--serif);font-size:20px;font-weight:normal;margin:0 0 12px;}
  .md h2{font-family:var(--serif);font-size:17px;font-weight:normal;margin:22px 0 9px;padding-bottom:6px;border-bottom:1px solid var(--border);}
  .md h3{font-size:13px;font-weight:600;color:var(--text2);margin:16px 0 6px;text-transform:uppercase;letter-spacing:0.04em;}
  .md p{margin:0 0 8px;}
  .md ul,.md ol{padding-left:1.4rem;margin:6px 0 10px;}
  .md li{margin:3px 0;}
  .md blockquote{border-left:2px solid var(--border3);padding:4px 12px;color:var(--text2);margin:8px 0;}
  .md table{width:100%;border-collapse:collapse;margin:12px 0;font-size:12px;}
  .md th{padding:7px 10px;border:1px solid var(--border);background:var(--bg2);font-weight:600;text-align:left;}
  .md td{padding:6px 10px;border:1px solid var(--border);}
  .md code{font-family:var(--mono);background:var(--bg2);padding:1px 5px;border-radius:3px;font-size:0.88em;}
  .md strong{font-weight:600;}
  .md em{color:var(--text2);font-style:italic;}
  /* Log */
  .log-section{margin-top:6px;}
  .log-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .log-title{font-family:var(--serif);font-size:17px;font-weight:normal;}
  .log-empty{text-align:center;padding:36px 20px;color:var(--text3);font-size:13px;border:1px dashed var(--border2);border-radius:var(--radius);}
  .log-timeline{display:flex;flex-direction:column;gap:10px;}
  .log-entry{display:flex;gap:14px;}
  .log-spine{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
  .log-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
  .log-dot-note{background:var(--text3);}
  .log-dot-decision{background:var(--blue);}
  .log-dot-trade{background:var(--gold);}
  .log-line{width:1px;background:var(--border);flex:1;min-height:12px;margin-top:3px;}
  .log-body{flex:1;padding-bottom:14px;}
  .log-meta{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;}
  .log-date{font-size:11px;font-family:var(--mono);color:var(--text3);}
  .log-type-label{font-size:11px;font-weight:500;padding:1px 7px;border-radius:20px;}
  .log-type-note{background:var(--bg2);color:var(--text2);}
  .log-type-decision{background:var(--blue-bg);color:var(--blue);}
  .log-type-trade{background:var(--gold-bg);color:var(--gold);}
  .log-decision-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:6px;}
  .log-trade-block{font-size:12px;font-family:var(--mono);background:var(--bg2);border-radius:var(--radius-sm);padding:7px 10px;margin-bottom:6px;}
  .log-trade-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:0;}
  .log-trade-item{display:flex;flex-direction:column;gap:2px;}
  .log-trade-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;font-family:var(--sans);}
  .log-trade-val{font-weight:600;color:var(--text);}
  .log-text{font-size:13px;line-height:1.65;color:var(--text);}
  .log-del-btn{font-size:11px;padding:2px 7px;margin-left:auto;color:var(--text3);border-color:transparent;background:transparent;}
  .log-del-btn:hover{color:var(--red);background:var(--red-bg);}
  .log-form{background:var(--bg2);border-radius:var(--radius);padding:16px;margin-bottom:20px;}
  .log-type-selector{display:flex;gap:6px;margin-bottom:14px;}
  .log-type-btn{font-size:12px;padding:5px 12px;border-radius:20px;}
  .log-type-btn.sel{background:var(--text);color:var(--bg);border-color:transparent;}
  .decision-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;}
  .decision-opt{font-size:12px;padding:6px 8px;border-radius:var(--radius-sm);text-align:center;border:1px solid var(--border2);cursor:pointer;background:var(--bg);transition:all 0.1s;}
  .decision-opt:hover{border-color:var(--border3);}
  .decision-opt.sel{border-color:var(--blue);background:var(--blue-bg);color:var(--blue);font-weight:500;}
  .trade-grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:12px;}
  /* Op status */
  .op-status-row{display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
  .op-status-label{font-size:11px;color:var(--text3);}
  .op-status-badge{font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;}
  .op-status-open{background:var(--bg2);color:var(--text3);}
  .op-status-closed{background:var(--green-bg);color:var(--green);}
  .op-status-rolled{background:var(--amber-bg);color:var(--amber);}
  .op-status-assigned{background:var(--red-bg);color:var(--red);}
  .op-status-comment{font-size:12px;color:var(--text2);font-style:italic;margin-top:4px;}
  .status-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
  .status-opt{font-size:13px;padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border2);cursor:pointer;text-align:center;transition:all 0.1s;background:var(--bg);}
  .status-opt:hover{border-color:var(--border3);}
  .status-opt.sel-open{border-color:var(--text3);background:var(--bg2);color:var(--text3);font-weight:600;}
  .status-opt.sel-closed{border-color:var(--green);background:var(--green-bg);color:var(--green);font-weight:600;}
  .status-opt.sel-rolled{border-color:var(--amber);background:var(--amber-bg);color:var(--amber);font-weight:600;}
  .status-opt.sel-assigned{border-color:var(--red);background:var(--red-bg);color:var(--red);font-weight:600;}
  /* Misc */
  .empty{text-align:center;padding:80px 20px;}
  .empty-title{font-family:var(--serif);font-size:22px;margin-bottom:10px;}
  .empty-sub{font-size:13px;color:var(--text2);margin-bottom:24px;line-height:1.6;}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:9px 20px;border-radius:var(--radius);font-size:13px;z-index:999;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap;}
  #toast.show{opacity:1;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:200;}
  .modal{background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);padding:28px;max-width:400px;width:90%;}
  .modal-title{font-weight:600;margin-bottom:8px;}
  .modal-sub{font-size:13px;color:var(--text2);margin-bottom:18px;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--text);border-radius:50%;animation:spin 0.6s linear infinite;flex-shrink:0;}
  .loading-row{display:flex;align-items:center;gap:10px;color:var(--text2);font-size:13px;padding:40px 20px;justify-content:center;}
  .notice{padding:10px 14px;border-radius:var(--radius-sm);font-size:12px;line-height:1.6;margin-bottom:14px;}
  .notice-amber{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(180,130,30,0.2);}
  .notice-blue{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(26,79,138,0.2);}
  .notice-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(29,107,62,0.2);}
  /* Settings */
  .settings-wrap{max-width:560px;}
  .settings-section{margin-bottom:28px;}
  .settings-title{font-family:var(--serif);font-size:16px;font-weight:normal;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}

  /* Logo */
  .card-logo { width:32px;height:32px;border-radius:6px;object-fit:contain;border:1px solid var(--border);background:var(--bg);flex-shrink:0; }
  .card-logo-fallback { width:32px;height:32px;border-radius:6px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--mono);color:var(--text2);flex-shrink:0; }
  /* Price zone */
  .zona-compra { font-size:12px;color:var(--text2);line-height:1.4;margin-top:2px; }
  .zona-compra span { color:var(--text3); }
  .price-in-zone { font-size:11px;padding:2px 8px;border-radius:20px;background:var(--green-bg);color:var(--green);font-weight:600; }
  .price-out-zone { font-size:11px;padding:2px 8px;border-radius:20px;background:var(--bg2);color:var(--text3); }
  .price-no-entry { font-size:11px;color:var(--text3); }
  @media(max-width:600px){
    .field-row{grid-template-columns:1fr;}
    .field-full{grid-column:span 1;}
    header{padding:0 14px;}
    main{padding:18px 14px;}
    .logo-sub{display:none;}
    .trade-grid-4{grid-template-columns:1fr 1fr;}
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <a class="logo" onclick="goLib()" href="javascript:void(0)">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <polygon points="11,2 20,8 20,20 2,20 2,8" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
        <rect x="7.5" y="13" width="7" height="7" fill="currentColor" rx="0.5"/>
      </svg>
      <span class="logo-name">ATLAS</span>
      <span class="logo-sub">Investment Research</span>
    </a>
    <div id="header-nav"></div>
  </header>
  <main id="main-content"></main>
</div>
<div id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────
const REPO   = 'diegogh33/atlas-research';
const BRANCH = 'main';
const RAW    = `https://raw.githubusercontent.com/${REPO}/${BRANCH}`;
const API    = `https://api.github.com/repos/${REPO}`;

// ── STATE ─────────────────────────────────────────────
let analyses   = [];   // parsed from MD files
let logData    = {};   // { ticker: [entries] }
let logSha     = null; // GitHub SHA of log.json (needed to update)
let selTicker  = null;
let logFormState = { type:'note', decision:'esperar', tradeType:'PUT', tradeAction:'open' };
let statusTargetId = null, selectedStatus = 'open';

// ── CREDENTIALS ───────────────────────────────────────
function getToken() { return localStorage.getItem('atlas_gh_pat') || ''; }
function saveToken(t) { localStorage.setItem('atlas_gh_pat', t); }
function authH(extra) {
  const h = { 'Content-Type': 'application/json', ...extra };
  const t = getToken();
  if (t) h['Authorization'] = `token ${t}`;
  return h;
}

// ── UTILS ─────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function today() { return new Date().toISOString().split('T')[0]; }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function setMain(h) { document.getElementById('main-content').innerHTML = h; }
function setNav(h)  { document.getElementById('header-nav').innerHTML = h; }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
function showModal(html) {
  removeModal();
  const el = document.createElement('div');
  el.className = 'modal-overlay'; el.id = 'modal';
  el.innerHTML = `<div class="modal">${html}</div>`;
  document.body.appendChild(el);
}
function removeModal() { document.getElementById('modal')?.remove(); }

// ── LABELS ────────────────────────────────────────────
const TIPO_LABELS = { accion:'Acción', cef:'CEF', etf:'ETF', growth:'Growth', opciones:'Opciones', otro:'Otro' };
const VALORACION = {
  alcista:    { label:'Alcista',         cls:'pill-alcista' },
  bajista:    { label:'Bajista',         cls:'pill-bajista' },
  neutral:    { label:'Neutral',         cls:'pill-neutral' },
  posicion:   { label:'Posición activa', cls:'pill-posicion' },
  seguimiento:{ label:'Seguimiento',     cls:'pill-seguimiento' },
};
const DECISIONS = [
  { id:'iniciar',    label:'Iniciar posición', color:'var(--green)',  bg:'var(--green-bg)' },
  { id:'anadir',     label:'Añadir',           color:'var(--blue)',   bg:'var(--blue-bg)' },
  { id:'mantener',   label:'Mantener',         color:'var(--text2)',  bg:'var(--bg2)' },
  { id:'reducir',    label:'Reducir',          color:'var(--amber)',  bg:'var(--amber-bg)' },
  { id:'vender',     label:'Vender',           color:'var(--red)',    bg:'var(--red-bg)' },
  { id:'esperar',    label:'Esperar',          color:'var(--text3)',  bg:'var(--bg3)' },
];
const TRADE_ACTIONS = [
  { id:'open',   label:'Abrir' },
  { id:'close',  label:'Cerrar' },
  { id:'expire', label:'Vencer' },
  { id:'assign', label:'Asignar' },
];
const ST_LABELS = { open:'Abierta', closed:'Cerrada', rolled:'Rolada', assigned:'Asignada' };

function pill(val) {
  const r = VALORACION[val] || VALORACION.neutral;
  return `<span class="pill ${r.cls}">${r.label}</span>`;
}
function tagEl(t) { return `<span class="tag">${esc(t)}</span>`; }

// ── FRONTMATTER PARSER ────────────────────────────────
function parseMd(raw) {
  const m = raw.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
  if (!m) return { meta:{}, body: raw };
  const meta = {};
  m[1].split('\n').forEach(line => {
    const ci = line.indexOf(':');
    if (ci < 0) return;
    const k = line.slice(0,ci).trim();
    const v = line.slice(ci+1).trim();
    meta[k] = v;
  });
  // parse tags array
  if (meta.tags) meta.tags = meta.tags.split(',').map(t=>t.trim()).filter(Boolean);
  else meta.tags = [];
  // parse numeric fields
  if (meta.entrada_max) meta.entrada_max = parseFloat(meta.entrada_max);
  return { meta, body: m[2].trim() };
}

// ── GITHUB DATA LAYER ─────────────────────────────────
async function loadAnalyses() {
  // List MD files in analyses/
  const res = await fetch(`${API}/contents/analyses`, { headers: authH() });
  if (!res.ok) throw new Error(`Error listando análisis (${res.status})`);
  const files = await res.json();
  const mdFiles = files.filter(f => f.name.endsWith('.md') && f.type === 'file');

  // Fetch each MD in parallel
  const fetched = await Promise.all(mdFiles.map(async f => {
    const r = await fetch(`${RAW}/analyses/${f.name}?_=${Date.now()}`);
    const text = await r.text();
    const { meta, body } = parseMd(text);
    return {
      ticker:     (meta.ticker||f.name.replace('.md','')).toUpperCase(),
      nombre:     meta.nombre || meta.ticker || '',
      tipo:       meta.tipo || 'otro',
      valoracion: meta.valoracion || 'neutral',
      resumen:    meta.resumen || '',
      tags:       meta.tags || [],
      fecha:      meta.fecha || '',
      zona_compra: meta.zona_compra || '',
      entrada_max: meta.entrada_max || null,
      body,
      filename: f.name,
      logo: null,
      currentPrice: null,
    };
  }));

  // Sort by ticker
  analyses = fetched.sort((a,b) => a.ticker.localeCompare(b.ticker));
}

async function loadLog() {
  try {
    // Use API to get SHA + content
    const res = await fetch(`${API}/contents/data/log.json`, { headers: authH() });
    if (res.ok) {
      const json = await res.json();
      logSha = json.sha;
      logData = JSON.parse(atob(json.content.replace(/\n/g,'')));
    }
  } catch { logData = {}; logSha = null; }
}

async function saveLog() {
  const token = getToken();
  if (!token) { promptToken(); return; }
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(logData, null, 2))));
  const body = { message:`Update log [ATLAS] ${today()}`, content, branch: BRANCH };
  if (logSha) body.sha = logSha;
  const res = await fetch(`${API}/contents/data/log.json`, {
    method: 'PUT',
    headers: authH(),
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err.message || `GitHub API error ${res.status}`);
  }
  const data = await res.json();
  logSha = data.content.sha;
}


// ── FINNHUB MARKET DATA ───────────────────────────────
function getFinnhubKey() { return localStorage.getItem('atlas_finnhub_key') || ''; }
function saveFinnhubKey(k) { localStorage.setItem('atlas_finnhub_key', k); }

async function loadMarketData() {
  const key = getFinnhubKey();
  if (!key) return;
  const FBASE = 'https://finnhub.io/api/v1';
  await Promise.all(analyses.map(async a => {
    try {
      const [pRes, qRes] = await Promise.all([
        fetch(`${FBASE}/stock/profile2?symbol=${a.ticker}&token=${key}`),
        fetch(`${FBASE}/quote?symbol=${a.ticker}&token=${key}`)
      ]);
      const profile = await pRes.json();
      const quote   = await qRes.json();
      if (profile.logo) a.logo = profile.logo;
      if (quote.c && quote.c > 0) a.currentPrice = quote.c;
    } catch { /* keep null */ }
  }));
}

function priceIndicatorHtml(a) {
  const p = a.currentPrice;
  if (!p) return '';
  const pStr = `$${p.toFixed(2)}`;
  if (a.entrada_max !== null && a.entrada_max > 0) {
    const inZone = p <= a.entrada_max;
    return inZone
      ? `<span class="price-in-zone">✓ En zona · ${pStr}</span>`
      : `<span class="price-out-zone">↑ ${pStr} · entrada &lt;= $${a.entrada_max.toFixed(2)}</span>`;
  }
  return `<span class="price-no-entry">${pStr}</span>`;
}

function logoHtml(a) {
  const fb = `<div class="card-logo-fallback">${a.ticker.slice(0,2)}</div>`;
  if (!a.logo) return fb;
  return `<img class="card-logo" src="${esc(a.logo)}" alt="${esc(a.ticker)}" onerror="this.style.display='none';this.insertAdjacentHTML('afterend','${fb.replace(/'/g,"\'")}')">`;
}

  } else if (s.type==='trade') {

    const aOpts=TRADE_ACTIONS.map(a=>`<button class="btn log-type-btn ${s.tradeAction===a.id?'sel':''}" onclick="setLogTradeAction('${a.id}')">${a.label}</button>`).join('');

function setLogType(t){logFormState.type=t;const c=document.getElementById('log-form-container');if(c)c.innerHTML=buildLogForm();}
function setLogDecision(d){logFormState.decision=d;const c=document.getElementById('log-form-container');if(c)c.innerHTML=buildLogForm();}
function setLogTradeType(t){logFormState.tradeType=t;const c=document.getElementById('log-form-container');if(c)c.innerHTML=buildLogForm();}
function setLogTradeAction(a){logFormState.tradeAction=a;const c=document.getElementById('log-form-container');if(c)c.innerHTML=buildLogForm();}

async function saveLogEntry() {
  const s=logFormState;
  const entry={ id:uid(), date:document.getElementById('le-date')?.value||today(), type:s.type, text:document.getElementById('le-text')?.value.trim()||'' };
  if (s.type==='note'&&!entry.text){toast('Escribe algo en la nota.');return;}
  if (s.type==='decision') entry.decision=s.decision;
  if (s.type==='trade') {
    entry.tradeType=s.tradeType; entry.tradeAction=s.tradeAction;
    entry.strike=document.getElementById('le-strike')?.value||'';
    entry.expiry=document.getElementById('le-expiry')?.value||'';
    entry.premium=document.getElementById('le-premium')?.value||'';
    entry.contracts=document.getElementById('le-contracts')?.value||'';
    entry.status='open'; entry.statusComment='';
  }
  if (!logData[selTicker]) logData[selTicker]=[];
  logData[selTicker].push(entry);
  const btn=document.getElementById('save-log-btn');
  if(btn){btn.disabled=true;btn.textContent='Guardando…';}
  try {
    await saveLog();
    toast('Entrada guardada ✓');
    showDetail('log');
  } catch(e) {
    toast('Error al guardar: '+e.message);
    logData[selTicker].pop(); // rollback
    if(btn){btn.disabled=false;btn.textContent='Guardar entrada';}
  }
}

async function deleteLogEntry(eid) {
  if (!logData[selTicker]) return;
  const prev = logData[selTicker];
  logData[selTicker] = logData[selTicker].filter(e=>e.id!==eid);
  try {
    await saveLog();
    toast('Entrada eliminada');
    showDetail('log');
  } catch(e) {
    toast('Error al eliminar: '+e.message);
    logData[selTicker] = prev;
  }
}

  const opts=ST.map(s=>`<div class="status-opt ${selectedStatus===s.id?s.cls:''}" onclick="selectStatus('${s.id}')">${s.label}</div>`).join('');
  showModal(`
    <p class="modal-title" style="margin-bottom:16px;">Actualizar estado de operación</p>

    </div>`);

function selectStatus(s){selectedStatus=s;const c=document.getElementById('st-comment')?.value||'';renderStatusModal(c);}
async function saveStatusChange() {
  const entry=(logData[selTicker]||[]).find(e=>e.id===statusTargetId);if(!entry)return;
  const prevStatus=entry.status, prevComment=entry.statusComment;
  entry.status=selectedStatus;
  entry.statusComment=document.getElementById('st-comment')?.value.trim()||'';
  const btn=document.getElementById('st-save-btn');
  if(btn){btn.disabled=true;btn.textContent='Guardando…';}
  try {
    await saveLog();
    removeModal();
    toast('Estado actualizado ✓');
    showDetail('log');
  } catch(e) {
    entry.status=prevStatus; entry.statusComment=prevComment;
    toast('Error al guardar: '+e.message);
    if(btn){btn.disabled=false;btn.textContent='Guardar';}
  }
}

// ── MARKDOWN ──────────────────────────────────────────
function mdInline(s) {
  return s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
          .replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g,'<em>$1</em>')
          .replace(/`([^`]+)`/g,'<code>$1</code>');
}
function mdRender(text) {
  if (!text) return '<p style="color:var(--text3)">Sin contenido.</p>';
  const lines=text.split('\n'); const out=[];
  let inUl=false,inOl=false,inTable=false,tRows=[];
  const closeL=()=>{if(inUl){out.push('</ul>');inUl=false;}if(inOl){out.push('</ol>');inOl=false;}};
  const flushT=()=>{
    if(!inTable)return;inTable=false;
    if(tRows.length<2){tRows=[];return;}
    const[hdr,,...body]=tRows;
    const ths=hdr.split('|').filter(c=>c.trim()).map(c=>`<th>${mdInline(esc(c.trim()))}</th>`).join('');
    const rows=body.map(r=>`<tr>${r.split('|').filter(c=>c.trim()).map(c=>`<td>${mdInline(esc(c.trim()))}</td>`).join('')}</tr>`).join('');
    out.push(`<div style="overflow-x:auto;"><table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table></div>`);
    tRows=[];
  };
  for (const raw of lines) {
    if(/^\|/.test(raw)){closeL();inTable=true;tRows.push(raw);continue;}else{flushT();}
    if(/^### /.test(raw)){closeL();out.push(`<h3>${mdInline(esc(raw.slice(4)))}</h3>`);}
    else if(/^## /.test(raw)){closeL();out.push(`<h2>${mdInline(esc(raw.slice(3)))}</h2>`);}
    else if(/^# /.test(raw)){closeL();out.push(`<h1>${mdInline(esc(raw.slice(2)))}</h1>`);}
    else if(/^\s*[-*] /.test(raw)){if(!inUl){out.push('<ul>');inUl=true;}out.push(`<li>${mdInline(esc(raw.replace(/^\s*[-*] /,'')))}</li>`);}
    else if(/^\d+\. /.test(raw)){if(!inOl){out.push('<ol>');inOl=true;}out.push(`<li>${mdInline(esc(raw.replace(/^\d+\. /,'')))}</li>`);}
    else if(/^> /.test(raw)){closeL();out.push(`<blockquote>${mdInline(esc(raw.slice(2)))}</blockquote>`);}
    else if(raw.trim()===''){closeL();out.push('<div style="height:6px;"></div>');}
    else{closeL();out.push(`<p>${mdInline(esc(raw))}</p>`);}
  }
  closeL();flushT();
  return out.join('');
}
